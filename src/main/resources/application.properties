server.port=${SERVER_PORT:8080}
spring.application.name=Aviation Service API

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aviation_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

security.jwt.secret=${JWT_SECRET:replace-this-secret-with-32-plus-characters}
security.jwt.access-expiration-seconds=${JWT_ACCESS_EXP_SECONDS:900}
security.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXP_SECONDS:604800}

# TLS (Task 6)
# To enable HTTPS set:
# - SERVER_PORT=8443
# - TLS_ENABLED=true
# - TLS_KEYSTORE_PATH=path-to-p12
# - TLS_KEYSTORE_PASSWORD=...
server.ssl.enabled=${TLS_ENABLED:false}
server.ssl.key-store=${TLS_KEYSTORE_PATH:}
server.ssl.key-store-password=${TLS_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=${TLS_KEYSTORE_TYPE:PKCS12}
server.ssl.key-alias=${TLS_KEY_ALIAS:aviation-22017}
